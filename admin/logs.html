<!DOCTYPE html>
<html lang="cs">
<head>

<meta charset="UTF-8">
<title>Admin – System Logs</title>

<link rel="stylesheet" href="/css/admin.css">

<!-- DataTables -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>

<script src="/api/js/api.js" defer></script>
<script src="/admin/js/logs_admin.js" defer></script>

</head>

<body class="admin-page">

<div id="adminHeader"></div>

<main class="auth-container">

<section class="admin-card">

<h2>System Logs</h2>

<div class="admin-actions">
<button class="btn" onclick="loadLogs()">🔄 Obnovit</button>
<a href="/admin/index.php" class="btn">⬅ Zpět</a>
</div>

<table id="logsTable" class="admin-table"></table>

</section>

</main>

<script>

fetch('/admin/partials/admin_header.html')
.then(r => r.text())
.then(html => {

 document.getElementById('adminHeader').innerHTML = html;

 const links = document.querySelectorAll('.admin-nav a');
 const currentFile = window.location.pathname.split("/").pop();

 links.forEach(link => {

   const linkFile = link.getAttribute('href').split("/").pop();

   if (currentFile === linkFile) {
     link.classList.add('active');
   }

 });

});

</script>

</body>
</html>
