<!DOCTYPE html>
<html lang="cs">
<head>

<meta charset="UTF-8">
<title>Admin – System Logs</title>

<link rel="stylesheet" href="/css/admin.css">

<!-- DataTables -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>

<script src="/api/js/api.js" defer></script>
<script src="/admin/js/logs_admin.js" defer></script>

</head>

<body class="admin-page">

<div id="adminHeader"></div>

<main class="auth-container">

<section class="admin-card">

<h2>System Logs</h2>

<div class="admin-tabs">

<button class="tab-btn active" onclick="openTab('logsTab')">
System Logs
</button>

<button class="tab-btn" onclick="openTab('securityTab')">
Security
</button>

</div>

<div class="admin-actions">
<button class="btn" onclick="loadLogs()">🔄 Obnovit</button>
<a href="/admin/index.php" class="btn">⬅ Zpět</a>
</div>
<div id="logsTab" class="tab-content">

<table id="logsTable" class="admin-table">
<thead>
<tr>
<th>Time</th>
<th>Action</th>
<th>User</th>
<th>Target</th>
<th>Status</th>
<th>Meta</th>
</tr>
</thead>

<tbody id="logs">
</tbody>

</table>

</div>
<div id="securityTab" class="tab-content" style="display:none">

<h3>Top brute-force IP</h3>

<table class="admin-table">
<thead>
<tr>
<th>IP</th>
<th>Login fails</th>
</tr>
</thead>

<tbody id="securityBrute">
</tbody>

</table>

</div>
</section>

</main>

<script>

fetch('/admin/partials/admin_header.html')
.then(r => r.text())
.then(html => {

 document.getElementById('adminHeader').innerHTML = html;

 const links = document.querySelectorAll('.admin-nav a');
 const currentFile = window.location.pathname.split("/").pop();

 links.forEach(link => {

   const linkFile = link.getAttribute('href').split("/").pop();

   if (currentFile === linkFile) {
     link.classList.add('active');
   }

 });

});
function openTab(tabId){

 document.querySelectorAll('.tab-content').forEach(t=>{
  t.style.display="none";
 });

 document.getElementById(tabId).style.display="block";

 document.querySelectorAll('.tab-btn').forEach(b=>{
  b.classList.remove("active");
 });

 const btns = document.querySelectorAll('.tab-btn');
 btns.forEach(btn=>{
  if(btn.getAttribute("onclick").includes(tabId)){
   btn.classList.add("active");
  }
 });

}
</script>

</body>
</html>
