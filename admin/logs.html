<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Admin – System Logs</title>

<link rel="stylesheet" href="/css/admin.css">

<script src="/api/js/api.js" defer></script>
<script src="/admin/js/logs_admin.js" defer></script>

</head>

<body class="admin-page">

<div id="adminHeader"></div>

<main class="auth-container">

<section class="admin-card">

<h2>System Logs</h2>

<div class="admin-actions">
<button onclick="loadLogs()">🔄 Obnovit</button>
<a href="/admin/index.php" class="btn">⬅ Zpět</a>
</div>

<table class="admin-table">

<thead>
<tr>
<th>Time</th>
<th>Action</th>
<th>User</th>
<th>Target</th>
<th>Status</th>
<th>Meta</th>
</tr>
</thead>

<tbody id="logs">
<!-- plní logs_admin.js -->
</tbody>

</table>

</section>

</main>

<script>

fetch('/admin/partials/admin_header.html')
.then(r => r.text())
.then(html => {

 document.getElementById('adminHeader').innerHTML = html;

 // zvýraznění aktivní stránky
 const links = document.querySelectorAll('.admin-nav a');
 const currentFile = window.location.pathname.split("/").pop();

 links.forEach(link => {

   const linkFile = link.getAttribute('href').split("/").pop();

   if (currentFile === linkFile) {
     link.classList.add('active');
   }

 });

});

</script>

</body>
</html>
