<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Přihlášení | Ordo Draconis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/style.css">
</head>

<body class="auth-page pre-auth">

  <!-- HEADER -->
  <header class="main-header">
    <div class="logo">
      <a href="/">Ordo Draconis</a>
    </div>

    <div class="auth">
      <a href="/auth/register.html" class="btn">Registrace</a>
      <a href="/auth/login.html" class="btn active">Přihlášení</a>
    </div>

    <div class="lang">
      <a href="/auth/login.html" class="active">CS</a>
      <a href="/auth/login-en.html">EN</a>
    </div>
  </header>

  <!-- CONTENT -->
  <main class="auth-container">
    <h1>Přihlášení</h1>
    <p class="auth-subtitle">
      Přihlas se ke svému webovému účtu Ordo Draconis.
    </p>

    <form id="loginForm" class="auth-form">

      <div class="form-group">
        <label for="email">E-mailová adresa</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="tvuj@email.cz"
          required
          autocomplete="email"
          autocapitalize="none"
          spellcheck="false"
          autofocus
        >
      </div>

      <div class="form-group">
        <label for="password">Heslo</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="********"
          required
          autocomplete="current-password"
        >
      </div>

      <!-- ✅ Remember me -->
      <div class="form-check">
        <label class="checkline">
          <input type="checkbox" id="remember" name="remember">
          <span>Zůstat přihlášený (důvěryhodné zařízení)</span>
        </label>
      </div>

      <!-- chyba -->
      <div class="form-error" id="loginError" style="display:none;"></div>

      <button type="submit" class="btn-primary" id="loginBtn">
        Přihlásit se
      </button>
    </form>

<div id="twofaLoginModal" class="modal hidden">
  <div class="modal-box">
    <h3>Zadej kód z aplikace</h3>

    <input 
  id="twofaLoginCode" 
  type="text" 
  placeholder="123 456"
  inputmode="numeric"
  maxlength="7"
/>

    <div class="modal-actions">
      <button id="twofaLoginCancel" class="btn">Zrušit</button>
      <button id="twofaLoginConfirm" class="btn btn-primary">Ověřit</button>
    </div>
  </div>
</div>

    <div class="auth-footer">
  <p>
    <a href="/auth/forgot-password.html">Zapomenuté heslo?</a>
  </p>
  <p>
    Nemáš ještě účet?
    <a href="/auth/register.html">Vytvoř si ho</a>
  </p>
</div>
  </main>

  <footer class="main-footer">
    <p>© Ordo Draconis</p>
  </footer>

  <script>
document.addEventListener('DOMContentLoaded', async () => {

  let isLogged = false;

  try {
    const res = await fetch('/api/me.php', { credentials: 'same-origin' });

    if (res.ok) {
      const data = await res.json();

      if (data.ok) {
        isLogged = true;

       const isEnPage = document.documentElement.lang === 'en';

window.location.href = isEnPage
  ? '/profile/index-en.html'
  : '/profile/index.html';
        return;
      }
    }
  } catch (e) {
    console.error(e);
  } finally {
    // 🔥 vždy odemkni stránku
    if (!isLogged) {
      document.body.classList.remove('pre-auth');
    }
  }

  // ⬇️ zbytek tvého login scriptu

  // 🔓 fallback → zobraz login
  document.body.classList.remove('pre-auth');

  const form = document.getElementById('loginForm');
  const errorBox = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');

  // 🔐 2FA modal prvky
  const modal = document.getElementById('twofaLoginModal');
  const confirmBtn = document.getElementById('twofaLoginConfirm');
  const cancelBtn = document.getElementById('twofaLoginCancel');
  const codeInput = document.getElementById('twofaLoginCode');

  // 🔥 reset po reloadu (fix session bug)
  if (modal) modal.classList.add('hidden');
  if (codeInput) codeInput.value = '';

  // 🔥 ENTER = potvrzení
  codeInput?.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      confirmBtn.click();
    }
  });

  // 🔥 formátování 123 456
  codeInput?.addEventListener('input', () => {
    let value = codeInput.value.replace(/\D/g, '').slice(0, 6);

    if (value.length > 3) {
      value = value.slice(0, 3) + ' ' + value.slice(3);
    }

    codeInput.value = value;

    // 🚀 auto submit po 6 číslech
    if (value.replace(/\s/g, '').length === 6) {
      confirmBtn.click();
    }
  });

  const errorMessages = {
    INVALID_CREDENTIALS: 'Nesprávný e-mail nebo heslo.',
    INVALID_EMAIL: 'Zadej platnou e-mailovou adresu.',
    TOO_MANY_ATTEMPTS: 'Příliš mnoho pokusů. Zkus to prosím později.',
    SERVER_ERROR: 'Došlo k chybě serveru. Zkus to prosím později.'
  };

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = 'block';
  }

  function setLoading(isLoading) {
    btn.disabled = isLoading;
    btn.style.opacity = isLoading ? '0.75' : '1';
    btn.textContent = isLoading ? 'Přihlašuji…' : 'Přihlásit se';
  }

  if (!form || !errorBox || !btn) return;

  // =========================
  // LOGIN
  // =========================
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.style.display = 'none';

    const formData = new FormData(form);
    formData.set('remember', document.getElementById('remember').checked ? '1' : '0');

    setLoading(true);

    try {
      const res = await fetch('/api/login.php', {
        method: 'POST',
        body: formData,
        credentials: 'same-origin'
      });

      const data = await res.json().catch(() => ({}));

      // ✅ normální login
      if (data.status === 'ok') {
  const isEnPage = document.documentElement.lang === 'en';

  window.location.href = isEnPage
    ? '/profile/index-en.html'
    : '/profile/index.html';

  return;
}

      // 🔐 2FA required
      if (data.status === '2fa_required') {
        modal.classList.remove('hidden');
        setLoading(false);

        setTimeout(() => codeInput?.focus(), 100); // 🔥 fix focus

        return;
      }

      const message = errorMessages[data.error] || data.error || 'Přihlášení se nezdařilo.';
      showError(message);

    } catch (err) {
      console.error(err);
      showError('Přihlášení se nezdařilo – zkontroluj připojení a zkus to znovu.');
    } finally {
      setLoading(false);
    }
  });

  // =========================
  // 2FA CONFIRM
  // =========================
  confirmBtn?.addEventListener('click', async () => {

    // 🔥 ochrana proti ručnímu kliknutí
    if (!modal || modal.classList.contains('hidden')) {
      return;
    }

    const code = codeInput.value.replace(/\s/g, '');

    if (!code || code.length !== 6) {
      alert('Zadej 6místný kód');
      return;
    }

    try {
      const res = await fetch('/api/2fa_verify.php', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code })
      });

      const data = await res.json();

      if (data.status === 'ok') {
  const isEnPage = document.documentElement.lang === 'en';

  window.location.href = isEnPage
    ? '/profile/index-en.html'
    : '/profile/index.html';
} 
      
      else {
        alert(data.error || 'Chybný kód');
      }

    } catch (err) {
      console.error(err);
      alert('Chyba serveru');
    }
  });

  // =========================
  // 2FA CANCEL
  // =========================
  cancelBtn?.addEventListener('click', () => {
    modal.classList.add('hidden');
    codeInput.value = '';
  });

});
</script>

</body>
</html>
