<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset password | Ordo Draconis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/style.css">
</head>

<body class="auth-page">
  <header class="main-header">
    <div class="logo"><a href="/">Ordo Draconis</a></div>
    <div class="auth">
      <a href="/auth/login-en.html" class="btn">Login</a>
    </div>
    <div class="lang">
      <a href="/auth/reset-password.html">CS</a>
      <a href="/auth/reset-password-en.html" class="active">EN</a>
    </div>
  </header>

  <main class="auth-container">
    <h1>Reset password</h1>
    <p class="auth-subtitle">Enter a new password for your account.</p>

    <form id="resetForm" class="auth-form">
      <div class="form-group">
        <label for="password">New password</label>
        <input type="password" id="password" name="password" minlength="6" required autocomplete="new-password">
      </div>

      <div class="form-group">
        <label for="password_confirm">Confirm password</label>
        <input type="password" id="password_confirm" name="password_confirm" minlength="6" required autocomplete="new-password">
      </div>
<div id="twofaResetModal" class="modal hidden">
  <div class="modal-box">
    <h3>Enter code from authenticator</h3>

    <input id="twofaResetCode" type="text" placeholder="123 456">

    <div class="modal-actions">
      <button id="twofaResetCancel" class="btn">Cancel</button>
      <button id="twofaResetConfirm" class="btn btn-primary">Verify</button>
    </div>
  </div>
</div>
      <div class="form-error" id="resetError" style="display:none;"></div>

      <button type="submit" class="btn-primary" id="resetBtn">Set new password</button>
    </form>

   <div class="auth-footer" id="resetOk" style="display:none;">
  <p>✅ Password successfully updated.</p>
  <p>You may now <a href="/auth/login-en.html">enter the world</a>.</p>
</div>
  </main>

  <footer class="main-footer"><p>© Ordo Draconis</p></footer>

  <script>
document.addEventListener('DOMContentLoaded', () => {

  const qs = new URLSearchParams(location.search);
  const token = qs.get('token') || '';

  const form = document.getElementById('resetForm');
  const err = document.getElementById('resetError');
  const ok = document.getElementById('resetOk');
  const btn = document.getElementById('resetBtn');

  // 🔐 2FA modal
  const modal = document.getElementById('twofaResetModal');
  const confirmBtn = document.getElementById('twofaResetConfirm');
  const cancelBtn = document.getElementById('twofaResetCancel');
  const codeInput = document.getElementById('twofaResetCode');

  const errors = {
    INVALID_TOKEN: 'Invalid link.',
    TOKEN_EXPIRED: 'This link has expired. Request a new reset link.',
    TOKEN_USED: 'This link has already been used.',
    PASSWORD_TOO_SHORT: 'Password must be at least 6 characters.',
    SERVER_ERROR: 'Server error. Please try again later.',
    "2FA_REQUIRED": 'Enter verification code.',
    "2FA_INVALID": 'Invalid 2FA code.'
  };

  function showError(msg) {
    err.textContent = msg;
    err.style.display = 'block';
  }

  function setLoading(on) {
    btn.disabled = on;
    btn.style.opacity = on ? '0.75' : '1';
    btn.textContent = on ? 'Saving…' : 'Set new password';
  }

  if (!token || !/^[a-f0-9]{64}$/.test(token)) {
    showError('Invalid link or missing token.');
    form.querySelectorAll('input,button').forEach(el => el.disabled = true);
    return;
  }

  // =========================
  // FORM SUBMIT
  // =========================
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.style.display = 'none';

    const pw = document.getElementById('password').value;
    const pw2 = document.getElementById('password_confirm').value;

    if (pw !== pw2) {
      showError('Passwords do not match.');
      return;
    }

    setLoading(true);

    try {
      const res = await fetch('/api/reset_password.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          token,
          password: pw,
          lang: 'en'
        })
      });

      const data = await res.json().catch(() => ({}));

      // 🔐 2FA required
      if (data.error === '2FA_REQUIRED') {
        modal.classList.remove('hidden');
        return;
      }

      // ✅ OK
      if (data.status === 'ok') {
        form.style.display = 'none';
        ok.style.display = 'block';

        const subtitle = document.querySelector('.auth-subtitle');
        if (subtitle) subtitle.style.display = 'none';
        return;
      }

      showError(errors[data.error] || 'Password reset failed.');

    } catch (e) {
      showError('Password reset failed — check your connection and try again.');
    } finally {
      setLoading(false);
    }
  });

  // =========================
  // 2FA CONFIRM
  // =========================
  confirmBtn?.addEventListener('click', async () => {

    const code = codeInput.value.replace(/\s/g, '');

    if (!code || code.length !== 6) {
      alert('Enter 6-digit code');
      return;
    }

    try {
      const res = await fetch('/api/reset_password.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          token,
          password: document.getElementById('password').value,
          code,
          lang: 'en'
        })
      });

      const data = await res.json();

      if (data.status === 'ok') {
        modal.classList.add('hidden');
        form.style.display = 'none';
        ok.style.display = 'block';

        const subtitle = document.querySelector('.auth-subtitle');
        if (subtitle) subtitle.style.display = 'none';

      } else {
        alert(errors[data.error] || 'Invalid code');
      }

    } catch (e) {
      alert('Server error');
    }
  });

  // =========================
  // CANCEL
  // =========================
  cancelBtn?.addEventListener('click', () => {
    modal.classList.add('hidden');
    codeInput.value = '';
  });

});
</script>
</body>
</html>
