<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Ordo Draconis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/mobile.css">
</head>

<body class="auth-page pre-auth">

  <!-- HEADER -->
  <header class="main-header">
    <div class="logo">
      <a href="/">Ordo Draconis</a>
    </div>

    <div class="auth">
      <a href="/auth/register-en.html" class="btn">Registration</a>
      <a href="/auth/login-en.html" class="btn active">Login</a>
    </div>

    <div class="lang">
      <a href="/auth/login.html">CS</a>
      <a href="/auth/login-en.html" class="active">EN</a>
    </div>
  </header>

  <!-- CONTENT -->
  <main class="auth-container">
    <h1>Login</h1>
    <p class="auth-subtitle">
      Log in to your Ordo Draconis web account.
    </p>

    <form id="loginForm" class="auth-form">

      <div class="form-group">
        <label for="email">Email address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="your@email.com"
          required
          autocomplete="email"
          autocapitalize="none"
          spellcheck="false"
          autofocus
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="********"
          required
          autocomplete="current-password"
        >
      </div>

      <!-- ✅ Remember me -->
     <div class="form-check">
  <label class="checkline">
    <input type="checkbox" id="remember" name="remember">
    <span>Stay logged in (trusted device)</span>
  </label>
</div>

      <!-- error -->
      <div class="form-error" id="loginError" style="display:none;"></div>

      <button type="submit" class="btn-primary" id="loginBtn">
        Login
      </button>
    </form>

<div id="twofaLoginModal" class="modal hidden">
  <div class="modal-box">
    <h3>Enter code from authenticator</h3>

    <input 
      id="twofaLoginCode" 
      type="text" 
      placeholder="123 456"
      inputmode="numeric"
      maxlength="7"
    />

    <div class="modal-actions">
      <button id="twofaLoginCancel" class="btn">Cancel</button>
      <button id="twofaLoginConfirm" class="btn btn-primary">Verify</button>
    </div>
  </div>
</div>

    <div class="auth-footer">
      <p><a href="/auth/forgot-password-en.html">Forgot password?</a></p>
        <p>
        Don’t have an account?
        <a href="/auth/register-en.html">Create one</a>
      </p>
    </div>
  </main>

  <footer class="main-footer">
    <p>© Ordo Draconis</p>
  </footer>

 <script>
document.addEventListener('DOMContentLoaded', async () => {

  let isLogged = false;

  try {
    const res = await fetch('/api/me.php', { credentials: 'same-origin' });

    if (res.ok) {
      const data = await res.json();

      if (data.ok) {
        isLogged = true;

const isEnPage = document.documentElement.lang === 'en';

window.location.href = isEnPage
  ? '/profile/index-en.html'
  : '/profile/index.html';
        return;
      }
    }
  } catch (e) {
    console.error(e);
  } finally {
    // 🔥 vždy odemkni stránku
    if (!isLogged) {
      document.body.classList.remove('pre-auth');
    }
  }

  // ⬇️ zbytek tvého login scriptu

  // 🔓 fallback → zobraz login
  document.body.classList.remove('pre-auth');

  // 🍪 Prefill email from cookie
  const rememberedEmail = document.cookie
    .split('; ')
    .find(r => r.startsWith('remembered_email='));
  if (rememberedEmail) {
    const emailVal = decodeURIComponent(rememberedEmail.split('=')[1]);
    const emailInput = document.getElementById('email');
    if (emailInput) {
      emailInput.value = emailVal;
      document.getElementById('remember').checked = true;
    }
  }

  const form = document.getElementById('loginForm');
  const errorBox = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');

  // 🔐 2FA modal elements
  const modal = document.getElementById('twofaLoginModal');
  const confirmBtn = document.getElementById('twofaLoginConfirm');
  const cancelBtn = document.getElementById('twofaLoginCancel');
  const codeInput = document.getElementById('twofaLoginCode');

  // 🔥 reset after reload
  if (modal) modal.classList.add('hidden');
  if (codeInput) codeInput.value = '';

  // 🔥 ENTER = confirm
  codeInput?.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      confirmBtn.click();
    }
  });

  // 🔥 format 123 456
  codeInput?.addEventListener('input', () => {
    let value = codeInput.value.replace(/\D/g, '').slice(0, 6);

    if (value.length > 3) {
      value = value.slice(0, 3) + ' ' + value.slice(3);
    }

    codeInput.value = value;

    // 🚀 auto submit after 6 digits
    if (value.replace(/\s/g, '').length === 6) {
      confirmBtn.click();
    }
  });

  const errorMessages = {
    INVALID_CREDENTIALS: 'Incorrect email or password.',
    INVALID_EMAIL: 'Please enter a valid email address.',
    TOO_MANY_ATTEMPTS: 'Too many attempts. Please try again later.',
    SERVER_ERROR: 'Server error. Please try again later.'
  };

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = 'block';
  }

  function setLoading(isLoading) {
    btn.disabled = isLoading;
    btn.style.opacity = isLoading ? '0.75' : '1';
    btn.textContent = isLoading ? 'Signing in…' : 'Login';
  }

  if (!form || !errorBox || !btn) return;

  // =========================
  // LOGIN
  // =========================
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.style.display = 'none';

    const formData = new FormData(form);
    formData.set('remember', document.getElementById('remember').checked ? '1' : '0');
    formData.set('lang', 'en');
    setLoading(true);

    try {
      const res = await fetch('/api/login.php', {
        method: 'POST',
        body: formData,
        credentials: 'same-origin'
      });

      const data = await res.json().catch(() => ({}));

      // ✅ normal login
      if (data.status === 'ok') {
        window.location.href = '/profile/index-en.html';
        return;
      }

      // 🔐 2FA required
      if (data.status === '2fa_required') {
        modal.classList.remove('hidden');
        setLoading(false);

        setTimeout(() => codeInput?.focus(), 100);

        return;
      }

      const message = errorMessages[data.error] || data.error || 'Login failed.';
      showError(message);

    } catch (err) {
      console.error(err);
      showError('Login failed — please check your connection and try again.');
    } finally {
      setLoading(false);
    }
  });

  // =========================
  // 2FA CONFIRM
  // =========================
  confirmBtn?.addEventListener('click', async () => {

    if (!modal || modal.classList.contains('hidden')) {
      return;
    }

    const code = codeInput.value.replace(/\s/g, '');

    if (!code || code.length !== 6) {
      alert('Enter 6-digit code');
      return;
    }

    try {
      const res = await fetch('/api/2fa_verify.php', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code })
      });

      const data = await res.json();

      if (data.status === 'ok') {
        window.location.href = '/profile/index-en.html';
      } else {
        alert(data.error || 'Invalid code');
      }

    } catch (err) {
      console.error(err);
      alert('Server error');
    }
  });

  // =========================
  // 2FA CANCEL
  // =========================
  cancelBtn?.addEventListener('click', () => {
    modal.classList.add('hidden');
    codeInput.value = '';
  });

});
</script>

</body>
</html>
